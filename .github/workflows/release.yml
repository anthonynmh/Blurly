name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & release Windows installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Blurly ${{ github.ref_name }}'
          releaseBody: |
            Windows installers built automatically from tag `${{ github.ref_name }}`.

            **First launch on Windows:** SmartScreen will warn that the app is from an unrecognized publisher (unsigned). Click **More info** → **Run anyway**. After that it launches normally.

            macOS artifacts are uploaded separately to this release.
          releaseDraft: false
          prerelease: false
          args: ''
